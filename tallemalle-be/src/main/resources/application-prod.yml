jwt:
  secret: ${JWT_SECRET}
  expire: ${JWT_EXPIRE}

project:
  payment:
    toss: ${TOSS_SECRET_KEY}

  aes:
    key: ${AES_KEY}

app:
  # 쿠키 관련 설정 (배포 환경 쿠키 세팅)
  cookie:
    domain: ${COOKIE_DOMAIN}  # 예: tallemalle.com 또는 192.168.x.x
    max-age: 86400            # 하루 (쿠키 삭제 시간)
    secure: true              # HTTPS(ssl) 환경 O
    same-site: "None"         # 배포 환경에서는 프론트/백 도메인 차이 허용
  front-url: ${FRONT_URL}       # 예: https://tallemalle.com 또는 http://192.168.x.x:5173
  api-url: ${API_URL}

# Jaeger 추가 시 주석 헤재 ======================
management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    tags:
      application: ${spring.application.name}
#  tracing:
#    sampling:
#      probability: 1.0  # 모든 요청을 트래킹 (데모용, 운영은 0.1 권장)
#  otlp:
#    tracing:
#      endpoint: http://<예거-서버-IP>:4318/v1/traces # 예거 수집 서버 주소

server:
  port: 443
  error:
    whitelabel:
      enabled: false  # 기본 whitelabel 에러 페이지 비활성화
    path: /error
  ssl:
    enabled: true
    key-store: file:./keystore.p12
    key-store-type: "PKCS12"
    key-store-password: ${SSL_KEY_PASS}

spring:
  application:
    name: tallemalle_backend

  config:
    import:
      - optional:file:.env.prod[.properties]    # 프로필이 'prod'일 때, .env.prod를 읽게 설정

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-name: kakao
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_ADDR}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
            required: true
          auth: true
          timeout: 5000

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: 15     # 운영 환경용 커넥션 풀 설정 추가
      minimum-idle: 10
      connection-timeout: 5000

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update        # 필수 수정: DB 스키마 자동 변경 방지 (안전성)
    properties:
      hibernate:
        format_sql: true

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      s3:
        bucket: bbsso           # 운영 전용 버킷인지 한 번 더 확인 필요
      region:
        static: ap-northeast-2

logging:
  level:
    org.hibernate.SQL: info
    org.springframework.security: info
    org.hibernate.orm.jdbc.bind: info

kakao:
  api:
    key: ${KAKAO_API_KEY}

portone:
  api:
    secret: ${PORTONE_SECRET_API}

webpush:
  vapid:
    public-key: ${VAPID_PUBLIC_KEY:}
    private-key: ${VAPID_PRIVATE_KEY:}
